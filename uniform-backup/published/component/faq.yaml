# yaml-language-server: $schema=https://eu.uniform.app/schemas/json-schema/component-definition/v1.json
$schema: https://eu.uniform.app/schemas/json-schema/component-definition/v1.json
id: faq
name: FAQ
icon: screen
parameters:
  - id: heading
    name: Heading
    type: text
    guidance: Section heading (e.g. Frequently Asked Questions)
    typeConfig:
      required: true
    localizable: true
  - id: description
    name: Description
    type: richText
    guidance: Section description with optional link text
    typeConfig:
      elements:
        builtIn:
          - h1
          - h2
          - h3
          - h4
          - h5
          - h6
          - unorderedList
          - orderedList
          - link
          - quote
          - code
          - table
          - asset
          - variable
      required: true
      formatting:
        builtIn:
          - bold
          - italic
          - underline
          - strikethrough
          - code
          - superscript
          - subscript
      elementsConfig:
        asset:
          allowedTypes:
            - image
    localizable: true
description: FAQ section with heading, description and accordion items
useTeamPermissions: true
slots:
  - id: faqItems
    name: FAQ Items
    minComponents: 3
    allowedComponents:
      - faqItem
    inheritAllowedComponents: false
    patternsInAllowedComponents: true
titleParameter: heading
canBeComposition: false
created: '2025-12-09T15:35:48.129009+00:00'
updated: '2025-12-09T15:35:48.129009+00:00'
