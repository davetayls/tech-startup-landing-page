                      version: 1
                      children:
                        - type: paragraph
                          format: ''
                          indent: 0
                          version: 1
                          children:
                            - mode: normal
                              text: >-
                                We maintain enterprise-grade security with SOC 2
                                Type II compliance, end-to-end encryption,
                                regular security audits, and 99.9% SLA uptime.
                                All data is encrypted at rest and in transit.
                              type: text
                              style: ''
                              detail: 0
                              format: 0
                              version: 1
                          direction: null
                          textStyle: ''
                          textFormat: 0
                      direction: null
                question:
                  type: text
                  value: What level of security does NeuralFlow provide?
            - _id: 98291877-b99d-4ae3-a0b6-34296ecfbce4
